  <style>
    :root {
      --ink: #0f172a; --ink-muted: #64748b; --surface-alt: #f8fafc;
      --border: #e2e8f0; --teal-600: #0d9488; --teal-700: #0f766e;
      --teal-800: #115e59; --teal-900: #134e4a; --amber-50: #fffbeb; --amber-500: #f59e0b;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-sans); color: var(--ink); background: var(--surface-alt); line-height: 1.6; }
    .top-nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; }
    .top-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--teal-800); }
    .nav-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--teal-600), var(--teal-800)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 14px; }
    .nav-brand-text { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
    .nav-back { font-size: 13px; color: var(--ink-muted); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
    .nav-back:hover { color: var(--teal-700); }
    .coming-soon-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 56px - 80px); padding: 3rem 2rem; text-align: center; }
    .coming-soon-badge { display: inline-block; background: var(--amber-50); color: var(--amber-500); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 1.5rem; }
    .coming-soon-page h1 { font-family: var(--font-serif); font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 400; margin-bottom: 0.75rem; }
    .coming-soon-page p { color: var(--ink-muted); font-size: 1.05rem; max-width: 480px; }
    .footer { text-align: center; padding: 2rem; font-size: 13px; color: var(--ink-muted); border-top: 1px solid var(--border); background: white; }
    .footer a { color: var(--teal-700); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
